name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false # never kill a half-finished release

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Install git-cliff
        env:
          GIT_CLIFF_VERSION: 2.13.1
        run: |
          archive="git-cliff-${GIT_CLIFF_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          base_url="https://github.com/orhun/git-cliff/releases/download/v${GIT_CLIFF_VERSION}"
          curl -sSfLO "${base_url}/${archive}"
          curl -sSfLO "${base_url}/${archive}.sha512"
          sha512sum -c "${archive}.sha512"
          tar -xf "$archive"
          install -m 755 "git-cliff-${GIT_CLIFF_VERSION}/git-cliff" /usr/local/bin/git-cliff

      - name: Update CHANGELOG.md
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git-cliff --config cliff.toml --verbose --output CHANGELOG.md

      - name: Open changelog PR
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.RELEASE_PR_GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --staged --quiet && exit 0

          # main requires PRs with passing status checks, so this can't push
          # directly. GITHUB_TOKEN can't be used for the push/PR either: GitHub
          # doesn't trigger workflows (so the required checks never run) for
          # events authored by the default token. RELEASE_PR_GITHUB_TOKEN is a
          # PAT for this, same pattern as HOMEBREW_TAP_GITHUB_TOKEN.
          branch="chore/changelog-$TAG"
          git checkout -b "$branch"
          git commit -m "chore(release): update CHANGELOG.md for $TAG"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "$branch"

          gh pr create \
            --title "chore(release): update CHANGELOG.md for $TAG" \
            --body "Automated changelog update for $TAG." \
            --base main --head "$branch"
          gh pr merge "$branch" --squash --auto
