name: Schema Drift Check

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC daily
  workflow_dispatch:

concurrency:
  group: schema-check
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Get latest Paperless-NGX release
        id: upstream
        run: |
          version=$(curl -sf https://api.github.com/repos/paperless-ngx/paperless-ngx/releases/latest \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['tag_name'])")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Read tracked version
        id: tracked
        run: echo "version=$(cat .paperless-version)" >> "$GITHUB_OUTPUT"

      - name: Detect version change
        id: compare
        env:
          UPSTREAM: ${{ steps.upstream.outputs.version }}
          TRACKED: ${{ steps.tracked.outputs.version }}
        run: |
          echo "Tracked: ${TRACKED}  /  Upstream: ${UPSTREAM}"
          if [ "${TRACKED}" = "${UPSTREAM}" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Full schema diff via Docker
        id: schema_diff
        if: steps.compare.outputs.changed == 'true'
        env:
          UPSTREAM: ${{ steps.upstream.outputs.version }}
        run: |
          docker pull "ghcr.io/paperless-ngx/paperless-ngx:${UPSTREAM}"
          docker run --rm \
            -e PAPERLESS_SECRET_KEY=changeme \
            -e PAPERLESS_DBENGINE=sqlite \
            "ghcr.io/paperless-ngx/paperless-ngx:${UPSTREAM}" \
            python3 /usr/src/paperless/src/manage.py spectacular \
              --file /dev/stdout --format openapi-json 2>/dev/null \
          > /tmp/new-schema-raw.json
          python3 scripts/fix-schema.py \
            --input /tmp/new-schema-raw.json \
            --output /tmp/new-schema-patched.json
          diff -u schema/paperless.json /tmp/new-schema-patched.json \
            | head -120 > /tmp/schema-diff.txt || true
          echo "has_diff=true" >> "$GITHUB_OUTPUT"

      - name: Check for existing open drift issue
        if: steps.compare.outputs.changed == 'true'
        id: existing_issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          issue_number=$(gh issue list \
            --label "schema-drift" \
            --state open \
            --json number \
            --jq '.[0].number // empty')
          echo "number=${issue_number}" >> "$GITHUB_OUTPUT"

      - name: Build issue body
        if: steps.compare.outputs.changed == 'true'
        env:
          TRACKED_VERSION: ${{ steps.tracked.outputs.version }}
          UPSTREAM_VERSION: ${{ steps.upstream.outputs.version }}
          HAS_DIFF: ${{ steps.schema_diff.outputs.has_diff }}
        run: python3 scripts/build-issue-body.py

      - name: Create or update drift issue
        if: steps.compare.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM_VERSION: ${{ steps.upstream.outputs.version }}
          EXISTING_ISSUE: ${{ steps.existing_issue.outputs.number }}
        run: |
          SAFE_VERSION=$(printf '%s' "$UPSTREAM_VERSION" | tr -cd '[:alnum:] ._-()')
          if [ -n "$EXISTING_ISSUE" ]; then
            gh issue comment "$EXISTING_ISSUE" \
              --body "Still unresolved as of $(date -u +%Y-%m-%d). Latest upstream: \`${SAFE_VERSION}\`."
          else
            gh issue create \
              --title "New Paperless-NGX release: ${SAFE_VERSION}" \
              --body-file /tmp/issue-body.md \
              --label "schema-drift"
          fi

      - name: Close resolved drift issue
        if: steps.compare.outputs.changed == 'false' && steps.existing_issue.outputs.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXISTING_ISSUE: ${{ steps.existing_issue.outputs.number }}
        run: |
          gh issue close "$EXISTING_ISSUE" \
            --comment "Tracked version is now in sync with upstream. Closing."
