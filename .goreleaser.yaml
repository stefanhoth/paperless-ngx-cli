version: 2

project_name: paperless-ngx-cli

before:
  hooks:
    - go mod tidy

builds:
  - binary: paperless
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -buildvcs=false
    ldflags:
      - -s -w -X github.com/stefanhoth/paperless-ngx-cli/cmd.Version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

homebrew_casks:
  - name: paperless-ngx-cli
    repository:
      owner: stefanhoth
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: https://github.com/stefanhoth/paperless-ngx-cli
    description: "Paperless-NGX document archive, from the terminal"
    binaries:
      - paperless

changelog:
  sort: asc
  use: github
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Security
      regexp: "^fix\\(security\\)"
      order: 1
    - title: Bug Fixes
      regexp: "^fix"
      order: 2
  filters:
    exclude:
      - "^chore"
      - "^ci"
      - "^docs"
      - "^refactor"
      - "^test"
      - "^style"
      - "^build"
